input {
  # 1. Wazuh 告警日志
  file {
    path => "/var/ossec/logs/alerts/alerts.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["wazuh_alert"]
  }

  # 2. Wazuh 运行日志
  file {
    path => "/var/ossec/logs/ossec.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["wazuh_raw"]
  }

  # 3. 宿主机系统日志
  file {
    path => "/host/var/log/syslog"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["syslog"]
  }

  # 4. 宿主机 SSH 登录日志
  file {
    path => "/host/var/log/auth.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["auth_log"]
  }
}

# 你原来的极简过滤器（完全正常）
filter {
  if "wazuh_alert" in [tags] {
    json { source => "message" }
  }
}

# 你原来的输出（完全正常）
output {
  if "wazuh_alert" in [tags] {
    opensearch {
      hosts => ["http://172.17.0.1:9200"]
      index => "alerts"
    }
  }

  if "wazuh_raw" in [tags] {
    opensearch {
      hosts => ["http://172.17.0.1:9200"]
      index => "raw-logs"
    }
  }

  if "syslog" in [tags] or "auth_log" in [tags] {
    opensearch {
      hosts => ["http://172.17.0.1:9200"]
      index => "system-logs"
    }
  }
}
