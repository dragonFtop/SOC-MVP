filebeat.inputs:
  - type: log
    paths:
      - /var/ossec/logs/ossec.log
    fields:
      log_type: raw

  - type: log
    paths:
      - /var/ossec/logs/alerts/alerts.json
    fields:
      log_type: alert

output.opensearch:
  hosts: ["http://opensearch:9200"]
  protocol: http
  index: "wazuh-%{[fields.log_type]}-%{+yyyy.MM.dd}"

setup.template.enabled: false
setup.ilm.enabled: false
